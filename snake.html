<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            margin-bottom: 15px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            background-color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-width: 100%;
        }

        .score-board {
            color: white;
            font-size: 18px;
            margin: 15px 0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .controls-info {
            color: white;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.9;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            color: #ff6b6b;
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* 方向控制按钮 */
        .direction-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .dir-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4ecca3 0%, #45b393 100%);
            border: none;
            border-radius: 15px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }

        .dir-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .dir-up {
            grid-column: 2;
            grid-row: 1;
        }

        .dir-left {
            grid-column: 1;
            grid-row: 2;
        }

        .dir-down {
            grid-column: 2;
            grid-row: 2;
        }

        .dir-right {
            grid-column: 3;
            grid-row: 2;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇 🐍</h1>
        <div class="score-board">
            得分：<span id="score">0</span> | 最高分：<span id="highScore">0</span>
        </div>
        <canvas id="gameCanvas" width="300" height="533"></canvas>
        <div id="message" class="game-over"></div>
        <button onclick="startGame()">开始游戏</button>
        
        <!-- 方向控制按钮 -->
        <div class="direction-pad">
            <button class="dir-btn dir-up" ontouchstart="changeDirection('up')" onmousedown="changeDirection('up')">⬆️</button>
            <button class="dir-btn dir-left" ontouchstart="changeDirection('left')" onmousedown="changeDirection('left')">⬅️</button>
            <button class="dir-btn dir-down" ontouchstart="changeDirection('down')" onmousedown="changeDirection('down')">⬇️</button>
            <button class="dir-btn dir-right" ontouchstart="changeDirection('right')" onmousedown="changeDirection('right')">➡️</button>
        </div>
        
        <div class="controls-info">
            使用方向键或下方按钮控制
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const messageElement = document.getElementById('message');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isGameRunning = false;

        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) }
            ];
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            messageElement.textContent = '';
            placeFood();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#ffcccc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#ff9999';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#4ecca3';
                } else {
                    // Body gradient
                    const greenValue = Math.max(100, 200 - index * 10);
                    ctx.fillStyle = `rgb(78, ${greenValue}, 163)`;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // Add shine effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(
                    segment.x * gridSize + 3,
                    segment.y * gridSize + 3,
                    gridSize / 3,
                    gridSize / 3
                );
            });

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Food glow effect
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateGame() {
            direction = { ...nextDirection };
            
            if (direction.x === 0 && direction.y === 0) {
                return;
            }

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
                
                // Increase speed slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            updateGame();
            drawGame();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
                messageElement.textContent = '🎉 新纪录！ 🎉';
            } else {
                messageElement.textContent = '游戏结束！';
            }
        }

        function startGame() {
            if (isGameRunning) {
                clearInterval(gameLoop);
            }
            
            initGame();
            isGameRunning = true;
            gameSpeed = 100;
            nextDirection = { x: 1, y: 0 }; // Start moving right
            messageElement.textContent = '';
            
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
            }
        });

        // Touch/Mouse direction controls
        function changeDirection(dir) {
            if (!isGameRunning) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'down':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'left':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'right':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        }

        // Initial draw
        initGame();
        drawGame();
    </script>
</body>
</html>
